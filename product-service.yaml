apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: anhduc8702/halo-microservices-app-product-service:38
          ports:
            - containerPort: 3002
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb:27017"
          envFrom:
            - secretRef:
                name: mysql-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 3002
      targetPort: 3002
